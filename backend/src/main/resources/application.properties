spring.application.name=backend

#=================
# postgreSQL 연결
#=================
spring.datasource.url=jdbc:postgresql://localhost:5432/proj
#spring.datasource.url=jdbc:postgresql://localhost:5432/proj?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=postgres
spring.datasource.password=1234

#=================
# JPA 설정
#=================
# Etity클래스를 기분으로 테이블 자동 생성 및 수정.
spring.jpa.hibernate.ddl-auto=update

# 런타임에 SQL쿼리를 콘솔에 출력
spring.jpa.show-sql=true

# sql쿼리 포맷 이쁘게
spring.jpa.properties.hibernate.format_sql=true

# Entity의 카멜케이스 클래스명() -> 변환시킴(소문자_테이블명으로)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

#=================
# security 콘솔출력 설정
#=================
logging.level.org.springframework.security=TRACE

#=================
# jwt 웹토큰 설정
#=================
jwt.secret=change-this-to-a-long-random-secret-key-at-least-32-bytes
jwt.access-token-validity=1800000
jwt.refresh-token-validity=604800000

#=================
# Swagger 설정
#=================
springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/api-docs

#=================
# Server 설정
#=================
server.port=8090